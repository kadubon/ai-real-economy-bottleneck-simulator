name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --extra dev --locked
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest
      - name: Streamlit import smoke
        run: uv run python -c "import streamlit_app; import realgrowthsim.gui.app"
